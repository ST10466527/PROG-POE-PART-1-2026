name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest   # Windows runner uses PowerShell

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ".\\PROG POE PART 1\\PROG POE PART 1.csproj"

    - name: Build project
      run: dotnet build ".\\PROG POE PART 1\\PROG POE PART 1.csproj" --no-restore --configuration Release

    # Tests disabled for now
    # - name: Run tests
    #   run: dotnet test ".\\PROG POE PART 1\\PROG POE PART 1.csproj" --no-build --verbosity normal
