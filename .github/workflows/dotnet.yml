name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'   # Use 8.0 since 10.0 is not valid

    - name: Restore dependencies
      run: dotnet restore "PROG POE PART 1/PROG POE PART 1.csproj"

    - name: Build project
      run: dotnet build "PROG POE PART 1/PROG POE PART 1.csproj" --no-restore --configuration Release

    # Temporarily disabled since you don’t have tests yet
    # - name: Run tests
    #   run: dotnet test "PROG POE PART 1/PROG POE PART 1.csproj" --no-build --verbosity normal
